<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Basic page setup -->
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Fuel Route Optimizer
    </title>

    <!-- Google font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Leaflet CSS for map -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <!-- Leaflet JS -->
    <script
        src="https://unpkg.com/leaflet/dist/leaflet.js">
    </script>

    <style>

        /* Reset default spacing */

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        /* Main background */

        body{

            min-height:100vh;

            padding:30px;

            background:
            linear-gradient(
                135deg,
                #020617,
                #0f172a,
                #1e293b
            );

            transition:0.4s;
        }

        /* Main container */

        .container{

            width:100%;
            max-width:1300px;

            margin:auto;

            padding:40px;

            border-radius:30px;

            backdrop-filter:blur(20px);

            background:
            rgba(255,255,255,0.08);

            border:
            1px solid rgba(255,255,255,0.08);

            box-shadow:
            0 10px 40px rgba(0,0,0,0.5);

            color:white;
        }

        /* Top bar */

        .top-bar{

            display:flex;

            justify-content:space-between;

            align-items:center;

            margin-bottom:35px;
        }

        /* Title */

        .title{

            font-size:44px;

            font-weight:700;

            background:
            linear-gradient(
                to right,
                #60a5fa,
                #818cf8
            );

            -webkit-background-clip:text;

            -webkit-text-fill-color:transparent;
        }

        /* Theme button */

        .theme-btn{

            border:none;

            padding:12px 22px;

            border-radius:14px;

            background:
            linear-gradient(
                to right,
                #2563eb,
                #7c3aed
            );

            color:white;

            cursor:pointer;

            font-weight:600;

            transition:0.3s;
        }

        .theme-btn:hover{

            transform:scale(1.05);
        }

        /* Input layout */

        .input-group{

            display:grid;

            grid-template-columns:1fr 1fr;

            gap:20px;

            margin-bottom:20px;
        }

        /* Input wrapper */

        .input-wrapper{

            position:relative;
        }

        /* Inputs and select */

        input,
        select{

            width:100%;

            padding:18px;

            border:none;

            outline:none;

            border-radius:16px;

            background:
            rgba(255,255,255,0.08);

            color:white;

            font-size:16px;

            border:
            1px solid rgba(255,255,255,0.08);
        }

        /* Vehicle dropdown spacing */

        select{

            margin-top:18px;
        }

        /* Placeholder */

        input::placeholder{

            color:#cbd5e1;
        }

        /* Suggestion box */

        #startSuggestions,
        #endSuggestions{

            position:absolute;

            width:100%;

            background:
            rgba(15,23,42,0.98);

            border-radius:14px;

            margin-top:8px;

            overflow:hidden;

            z-index:999;

            border:
            1px solid rgba(255,255,255,0.08);
        }

        /* Suggestion item */

        .suggestion-item{

            padding:14px;

            cursor:pointer;

            transition:0.2s;
        }

        .suggestion-item:hover{

            background:
            rgba(59,130,246,0.2);
        }

        /* Main button */

        .btn{

            width:100%;

            padding:18px;

            border:none;

            border-radius:18px;

            background:
            linear-gradient(
                to right,
                #2563eb,
                #7c3aed
            );

            color:white;

            font-size:18px;

            font-weight:600;

            cursor:pointer;

            transition:0.3s;

            margin-bottom:35px;

            box-shadow:
            0 10px 30px rgba(124,58,237,0.35);
        }

        .btn:hover{

            transform:
            translateY(-4px);

            box-shadow:
            0 15px 35px rgba(124,58,237,0.45);
        }

        /* Loading text */

        .loading{

            display:none;

            text-align:center;

            margin-bottom:20px;

            font-size:18px;

            font-weight:600;

            color:#60a5fa;
        }

        /* Result section */

        .result-box{

            display:none;

            animation:fadeIn 0.5s ease;
        }

        /* Result heading */

        .result-title{

            font-size:34px;

            margin-bottom:25px;

            font-weight:700;
        }

        /* Cards layout */

        .cards{

            display:grid;

            grid-template-columns:
            repeat(3,1fr);

            gap:22px;

            margin-bottom:30px;
        }

        /* Single card */

        .card{

            padding:30px;

            border-radius:28px;

            background:
            rgba(255,255,255,0.07);

            border:
            1px solid rgba(255,255,255,0.08);

            transition:0.35s;

            backdrop-filter:blur(15px);

            box-shadow:
            0 8px 30px rgba(0,0,0,0.25);
        }

        .card:hover{

            transform:
            translateY(-8px)
            scale(1.02);

            border:
            1px solid rgba(96,165,250,0.4);

            box-shadow:
            0 15px 40px rgba(37,99,235,0.25);
        }

        /* Card heading */

        .card h3{

            margin-bottom:14px;

            color:#60a5fa;

            font-size:24px;
        }

        /* Card text */

        .card p{

            font-size:20px;

            font-weight:500;

            line-height:1.7;
        }

        /* Map style */

        #map{

            width:100%;

            height:550px;

            background:#0f172a;

            border-radius:30px;

            overflow:hidden;

            margin-top:20px;

            border:
            2px solid rgba(255,255,255,0.08);

            box-shadow:
            0 10px 40px rgba(0,0,0,0.35);
        }

        /* Footer */

        .footer{

            margin-top:35px;

            text-align:center;

            font-size:16px;

            color:#cbd5e1;
        }

        /* Light mode */

        .light-mode{

            background:
            linear-gradient(
                135deg,
                #e2e8f0,
                #f8fafc
            );
        }

        .light-mode .container{

            background:
            rgba(255,255,255,0.75);

            color:black;
        }

        .light-mode input,
        .light-mode select{

            background:#e2e8f0;

            color:black;
        }

        .light-mode .card{

            background:white;

            color:black;
        }

        /* Animation */

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(20px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        /* Responsive */

        @media(max-width:1000px){

            .cards{

                grid-template-columns:1fr 1fr;
            }
        }

        @media(max-width:700px){

            .input-group,
            .cards{

                grid-template-columns:1fr;
            }

            .title{

                font-size:32px;
            }

            .container{

                padding:25px;
            }
        }

    </style>

</head>

<body>

    <!-- Main app container -->

    <div class="container">

        <!-- Top section -->

        <div class="top-bar">

            <div class="title">
                Fuel Route Optimizer
            </div>

            <!-- Theme toggle -->

            <button
                class="theme-btn"
                onclick="toggleTheme()">

                Theme
            </button>

        </div>

        <!-- Input section -->

        <div class="input-group">

            <!-- Start input -->

            <div class="input-wrapper">

                <input
                    type="text"
                    id="start"
                    placeholder="Start Location"
                    onkeyup="showSuggestions('start')">

                <div id="startSuggestions"></div>

            </div>

            <!-- End input -->

            <div class="input-wrapper">

                <input
                    type="text"
                    id="end"
                    placeholder="Destination"
                    onkeyup="showSuggestions('end')">

                <div id="endSuggestions"></div>

            </div>

        </div>

        <!-- Vehicle selection -->

        <select id="vehicle">

            <option value="truck">
                Truck
            </option>

            <option value="suv">
                SUV
            </option>

            <option value="sedan">
                Sedan
            </option>

        </select>

        <br><br>

        <!-- Search button -->

        <button
            class="btn"
            onclick="findRoute()">

            Find Best Route
        </button>

        <!-- Loading -->

        <div
            class="loading"
            id="loading">

            Finding Best Route...
        </div>

        <!-- Result section -->

        <div
            class="result-box"
            id="resultBox">

            <div class="result-title">
                Trip Analytics
            </div>

            <!-- Cards -->

            <div class="cards">

                <div class="card">
                    <h3>Distance</h3>
                    <p id="distance"></p>
                </div>

                <div class="card">
                    <h3>Fuel Cost</h3>
                    <p id="cost"></p>
                </div>

                <div class="card">
                    <h3>Fuel Needed</h3>
                    <p id="fuel"></p>
                </div>

                <div class="card">
                    <h3>Fuel Stops</h3>
                    <p id="stops"></p>
                </div>

                <div class="card">
                    <h3>Drive Time</h3>
                    <p id="time"></p>
                </div>

                <div class="card">
                    <h3>Vehicle</h3>
                    <p id="vehicleType"></p>
                </div>

                <div class="card">
                    <h3>Weather</h3>
                    <p id="weather"></p>
                </div>

                <div class="card">
                    <h3>Best Fuel Station</h3>
                    <p id="station"></p>
                </div>

            </div>

            <!-- Map -->

            <div id="map"></div>

            <!-- Footer -->

            <div class="footer">
                Developed by Ramji Patel 🚀
            </div>

        </div>

    </div>

    <script>

        // Global map variables

        let map;

        let routeLine;

        // ===================================
        // Main route function
        // ===================================

        async function findRoute(){

            const start =
            document.getElementById(
                'start'
            ).value;

            const end =
            document.getElementById(
                'end'
            ).value;

            const vehicle =
            document.getElementById(
                'vehicle'
            ).value;

            // Show loading

            document
            .getElementById(
                'loading'
            ).style.display = 'block';

            // API call

            const response = await fetch(

                `/api/route/?start=${
                    encodeURIComponent(start)
                }&end=${
                    encodeURIComponent(end)
                }&vehicle=${
                    vehicle
                }`
            );

            const data =
            await response.json();

            // Hide loading

            document
            .getElementById(
                'loading'
            ).style.display = 'none';

            // Error handling

            if(!data.success){

                alert(data.message);

                return;
            }

            // Show results

            document
            .getElementById(
                'resultBox'
            ).style.display = 'block';

            // Fill card data

            document
            .getElementById('distance')
            .innerHTML =

            data.trip_details.distance_miles +
            ' Miles<br>(' +

            data.trip_details.distance_km +
            ' KM)';

            document
            .getElementById('cost')
            .innerHTML =

            '$ ' +
            data.fuel_details
            .estimated_total_cost_usd;

            document
            .getElementById('fuel')
            .innerHTML =

            data.fuel_details
            .fuel_needed_liters +
            ' Liters';

            document
            .getElementById('stops')
            .innerHTML =

            data.fuel_details
            .recommended_fuel_stops;

            document
            .getElementById('time')
            .innerHTML =

            data.trip_details
            .estimated_drive_time_hours +
            ' Hours';

            document
            .getElementById('vehicleType')
            .innerHTML =

            data.vehicle_details
            .vehicle_type;

            document
            .getElementById('weather')
            .innerHTML =

            data.weather_details.temperature +
            ' - ' +

            data.weather_details.condition;

            document
            .getElementById('station')
            .innerHTML =

            data.best_fuel_stop
            .truckstop_name +

            '<br>' +

            data.best_fuel_stop.city +

            ', ' +

            data.best_fuel_stop.state;

            // ============================
            // MAP
            // ============================

            if(map){

                map.remove();
            }

            // Clean map container

            document
            .getElementById('map')
            .innerHTML = '';

            // Create map

            map = L.map(
                'map',
                {
                    preferCanvas:true
                }
            );

            // Tile layer

            L.tileLayer(

                'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',

                {
                    attribution:
                    '© OpenStreetMap'
                }

            ).addTo(map);

            // USA center

            map.setView(
                [39.8283, -98.5795],
                4
            );

            // Simple marker

            L.marker(
                [39.8283, -98.5795]
            ).addTo(map)
            .bindPopup(
                'Route Generated Successfully'
            );

            // Important refresh

            setTimeout(() => {

                map.invalidateSize();

            }, 500);
        }

        // ===================================
        // Suggestions
        // ===================================

        async function showSuggestions(type){

            const input =

            document
            .getElementById(type)
            .value;

            if(input.length < 2){

                document
                .getElementById(
                    type + 'Suggestions'
                ).innerHTML = '';

                return;
            }

            const response = await fetch(

                `/api/suggestions/?query=${
                    encodeURIComponent(input)
                }`
            );

            const suggestions =
            await response.json();

            let html = '';

            suggestions.forEach(location => {

                html += `

                    <div
                        class="suggestion-item"

                        onclick="
                            selectLocation(
                                '${type}',
                                '${location}'
                            )
                        ">

                        ${location}

                    </div>
                `;
            });

            document
            .getElementById(
                type + 'Suggestions'
            ).innerHTML = html;
        }

        // Select suggestion

        function selectLocation(type, value){

            document
            .getElementById(type)
            .value = value;

            document
            .getElementById(
                type + 'Suggestions'
            ).innerHTML = '';
        }

        // Theme toggle

        function toggleTheme(){

            document.body.classList.toggle(
                'light-mode'
            );
        }

    </script>

</body>
</html>
